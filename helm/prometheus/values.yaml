prometheus:
  prometheusSpec:
    retention: "15d"
    scrapeInterval: "15s"
    evaluationInterval: "15s"

    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "gp3"
          resources:
            requests:
              storage: "50Gi"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
